<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日文五十音複習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;}

/* ── Tabs ── */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0ddd8;position:sticky;top:0;z-index:20;}
.tab{flex:1;padding:11px 2px;font-size:11px;border:none;background:none;color:#999;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.tab.active{color:#1a1a1a;border-bottom:2px solid #4A44A8;font-weight:700;}
.panel{display:none;padding:12px 10px 24px;}
.panel.active{display:block;}

/* ── 選範圍：大表 ── */
.chart-section{margin-bottom:16px;}
.chart-title{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;margin-bottom:8px;display:inline-block;}
.chart-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.chart-table{border-collapse:separate;border-spacing:3px;table-layout:fixed;}
.chart-table td,.chart-table th{padding:0;vertical-align:middle;text-align:center;}
/* column header */
.col-hd{font-size:9px;color:#aaa;text-align:center;padding:3px 0;white-space:nowrap;width:60px;}
/* row header */
.row-hd{font-size:11px;font-weight:700;text-align:center;padding:6px 2px;border-radius:8px;white-space:nowrap;cursor:pointer;user-select:none;display:block;width:44px;box-sizing:border-box;}
/* kana cell */
.kc{width:60px;height:60px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,opacity 0.15s;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.kc:active{opacity:0.75;}
.kc.selected{border-color:#1a1a1a !important;}
.kc.dimmed{opacity:0.28;}
.kc-h{font-size:18px;line-height:1;display:block;padding-top:8px;}
.kc-k{font-size:12px;color:#555;display:block;margin-top:1px;}
.kc-r{font-size:9px;color:#888;display:block;margin-top:1px;}
.kc-empty{width:60px;height:60px;display:block;margin:0 auto;}

/* colour themes per section */
.sec-sei  .row-hd{background:#FFE0CC;color:#7A3800;}
.sec-daku .row-hd{background:#D8EED8;color:#1A5C1A;}
.sec-han  .row-hd{background:#FFD8E8;color:#8C1C50;}
.sec-you  .row-hd{background:#D8E8FF;color:#1A3C8C;}

.sec-sei  .kc{background:#FFF4EE;}
.sec-daku .kc{background:#EEF7EE;}
.sec-han  .kc{background:#FFF0F6;}
.sec-you  .kc{background:#EEF2FF;}

/* 假名 / 片假名 toggle in cell */
.dual{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0;}
.dual .h{font-size:19px;line-height:1.15;color:#333;font-weight:500;}
.dual .k{font-size:13px;color:#888;line-height:1.1;}
.dual .r{font-size:8px;color:#bbb;margin-top:0;}

/* top filter pills */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.fpill{padding:6px 14px;font-size:12px;border:1.5px solid #ccc;border-radius:99px;cursor:pointer;background:#fff;color:#666;font-weight:500;}
.fpill.on-h{background:#EEEDFE;border-color:#534AB7;color:#26215C;}
.fpill.on-k{background:#FFF3E8;border-color:#C45C00;color:#7A3800;}
.hint{font-size:11px;color:#aaa;margin-bottom:8px;}

/* ── 學筆畫 ── */
.tri-toggle{display:flex;gap:6px;margin-bottom:12px;}
.tri-btn{flex:1;padding:9px 4px;font-size:12px;border:1.5px solid #ddd;border-radius:10px;cursor:pointer;background:#fff;color:#888;font-weight:500;text-align:center;line-height:1.3;}
.tri-btn.active{background:#26215C;border-color:#26215C;color:#fff;}
.stroke-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.stroke-card{border:1.5px solid #e8e6e0;border-radius:12px;padding:10px 6px;cursor:pointer;background:#fff;text-align:center;}
.stroke-card:active{background:#EEEDFE;}
.sk-char{font-size:28px;line-height:1.2;}
.sk-roma{font-size:10px;color:#999;margin-top:3px;}
.stroke-viewer{border:1.5px solid #e8e6e0;border-radius:14px;padding:24px 16px;background:#fff;text-align:center;margin-bottom:12px;}
.tip-box{background:#f7f6f2;border-radius:12px;padding:14px;margin-bottom:12px;}
.tip-title{font-size:14px;font-weight:600;margin-bottom:6px;}
.tip-body{font-size:13px;color:#555;line-height:1.6;}
.sound-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;padding:7px 16px;border-radius:99px;background:#EEEDFE;color:#3C3489;border:1px solid #AFA9EC;cursor:pointer;margin-top:10px;}
.back-btn{font-size:13px;color:#888;background:none;border:none;cursor:pointer;padding:0 0 12px 0;display:block;}
.nav-row{display:flex;gap:8px;justify-content:center;}
.nav-btn{flex:1;max-width:140px;padding:11px;font-size:13px;border:1.5px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;}

/* ── 測驗 ── */
.quiz-scores{display:flex;background:#fff;border:1.5px solid #e8e6e0;border-radius:12px;overflow:hidden;margin-bottom:12px;}
.score-item{flex:1;text-align:center;padding:10px 4px;border-right:1px solid #e8e6e0;}
.score-item:last-child{border-right:none;}
.score-num{font-size:22px;font-weight:700;}
.score-lbl{font-size:10px;color:#999;margin-top:2px;}
.quiz-box{background:#fff;border:1.5px solid #e8e6e0;border-radius:14px;padding:20px 14px;text-align:center;}
.quiz-ch{font-size:72px;line-height:1.1;margin-bottom:16px;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:320px;margin:0 auto;}
.quiz-opt{padding:13px 8px;font-size:15px;border:1.5px solid #ddd;border-radius:10px;cursor:pointer;background:#fff;transition:all 0.1s;}
.quiz-opt:active{transform:scale(0.96);}
.quiz-opt.correct{background:#EAF3DE;border-color:#3B6D11;color:#27500A;}
.quiz-opt.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313;}
.quiz-result{font-size:14px;margin-top:12px;min-height:20px;color:#555;}
.prog-wrap{height:4px;background:#eee;border-radius:2px;margin-bottom:12px;}
.prog-bar{height:4px;background:#7F77DD;border-radius:2px;transition:width 0.3s;}
.btn-main{width:100%;padding:14px;font-size:15px;border:none;border-radius:12px;background:#26215C;color:#fff;font-weight:600;cursor:pointer;margin-bottom:8px;}
.btn-main:active{background:#3C3489;}
.mode-card{padding:14px 10px;border:1.5px solid #ddd;border-radius:12px;background:#fff;cursor:pointer;text-align:left;width:100%;}
.mode-card.active{border-color:#534AB7;background:#EEEDFE;}
.mode-card.active .mc-title{color:#26215C;}
.mode-card.active .mc-sub{color:#7F77DD;}
.mc-icon{font-size:20px;margin-bottom:4px;}
.mc-title{font-size:13px;font-weight:600;color:#555;}
.mc-sub{font-size:11px;color:#aaa;margin-top:2px;}
.sel-summary{background:#fff;border:1.5px solid #e8e6e0;border-radius:12px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.row-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.row-btn{padding:6px 11px;font-size:12px;border:1.5px solid #ddd;border-radius:8px;cursor:pointer;background:#fff;color:#666;}
.row-btn.sel-h{background:#EEEDFE;border-color:#534AB7;color:#3C3489;font-weight:600;}
.row-btn.sel-k{background:#FFF3E8;border-color:#C45C00;color:#7A3800;font-weight:600;}
.ctrl-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.ctrl-btn{padding:6px 12px;font-size:12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#666;}
.section-label{font-size:11px;font-weight:600;color:#aaa;letter-spacing:0.05em;margin:8px 0 5px;}

/* ── 單字字卡 ── */
.cat-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:12px;}
.cat-row{display:flex;gap:6px;white-space:nowrap;}
.cat-btn{padding:6px 14px;font-size:12px;border:1.5px solid #ddd;border-radius:99px;cursor:pointer;background:#fff;color:#666;}
.cat-btn.active{background:#E1F5EE;border-color:#0F6E56;color:#085041;font-weight:600;}
.word-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.word-card{border:1.5px solid #e8e6e0;border-radius:12px;padding:12px 10px;background:#fff;cursor:pointer;position:relative;}
.word-card:active{background:#E1F5EE;}
.w-jp{font-size:26px;line-height:1.2;margin-bottom:3px;}
.w-kana{font-size:11px;color:#888;margin-bottom:2px;}
.w-tw{font-size:13px;}
.w-roma{font-size:10px;color:#bbb;font-family:monospace;}
.w-icon{position:absolute;top:8px;right:8px;font-size:14px;color:#1D9E75;opacity:0.6;}
.wdetail-jp{font-size:52px;line-height:1.1;margin-bottom:6px;}
.wdetail-kana{font-size:16px;color:#666;margin-bottom:4px;}
.wdetail-tw{font-size:20px;font-weight:600;margin-bottom:4px;}
.wdetail-roma{font-size:13px;color:#aaa;font-family:monospace;}
.ex-box{background:#f7f6f2;border-radius:12px;padding:14px;margin-top:12px;}
.ex-jp{font-size:15px;margin-bottom:5px;}
.ex-tw{font-size:13px;color:#666;}
.end-box{text-align:center;padding:40px 20px;}
.end-emoji{font-size:52px;margin-bottom:16px;}
.end-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.end-sub{font-size:14px;color:#666;margin-bottom:24px;}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('select')">五十音表</button>
  <button class="tab" onclick="showTab('stroke')">學筆畫</button>
  <button class="tab" onclick="showTab('quiz')">測驗</button>
  <button class="tab" onclick="showTab('words')">單字字卡</button>
</div>

<!-- ══════════ 五十音表 ══════════ -->
<div class="panel active" id="tab-select">
  <div class="filter-bar">
    <button class="fpill on-h" id="fp-h" onclick="toggleFilter('h')">平假名 ひ</button>
    <button class="fpill on-k" id="fp-k" onclick="toggleFilter('k')">片假名 カ</button>
  </div>
  <div class="hint">點擊格子聽發音・點行標題選取/取消整行</div>

  <!-- 1. 清音 -->
  <div class="chart-section sec-sei" id="sec-sei">
    <div class="chart-title" style="background:#FFE0CC;color:#7A3800">1. 清音</div>
    <div class="chart-scroll"><table class="chart-table" id="tbl-sei"></table></div>
  </div>

  <!-- 2. 濁音 -->
  <div class="chart-section sec-daku" id="sec-daku">
    <div class="chart-title" style="background:#D8EED8;color:#1A5C1A">2. 濁音</div>
    <div class="chart-scroll"><table class="chart-table" id="tbl-daku"></table></div>
  </div>

  <!-- 3. 半濁音 -->
  <div class="chart-section sec-han" id="sec-han">
    <div class="chart-title" style="background:#FFD8E8;color:#8C1C50">3. 半濁音</div>
    <div class="chart-scroll"><table class="chart-table" id="tbl-han"></table></div>
  </div>

  <!-- 4. 拗音 -->
  <div class="chart-section sec-you" id="sec-you">
    <div class="chart-title" style="background:#D8E8FF;color:#1A3C8C">4. 拗音</div>
    <div class="chart-scroll"><table class="chart-table" id="tbl-you"></table></div>
  </div>
</div>

<!-- ══════════ 學筆畫 ══════════ -->
<div class="panel" id="tab-stroke">
  <div class="tri-toggle" style="max-width:260px">
    <button class="tri-btn active" id="btn-shira" onclick="setStrokeType('h')">平假名</button>
    <button class="tri-btn" id="btn-skata" onclick="setStrokeType('k')">片假名</button>
  </div>
  <div id="stroke-list">
    <div style="font-size:12px;color:#888;margin-bottom:6px">點擊假名查看書寫說明</div>
    <div class="stroke-grid" id="stroke-grid"></div>
  </div>
  <div id="stroke-detail" style="display:none">
    <button class="back-btn" onclick="backToGrid()">← 返回列表</button>
    <div class="stroke-viewer">
      <div style="font-size:80px;line-height:1.1" id="sv-char">あ</div>
      <div style="font-size:14px;color:#888;margin-top:6px;font-family:monospace" id="sv-roma-d"></div>
      <button class="sound-btn" onclick="speakSV()">🔊 發音</button>
    </div>
    <div class="tip-box">
      <div class="tip-title" id="sv-name"></div>
      <div class="tip-body" id="sv-tip"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevStroke()">← 上一個</button>
      <button class="nav-btn" onclick="nextStroke()">下一個 →</button>
    </div>
  </div>
</div>

<!-- ══════════ 測驗 ══════════ -->
<div class="panel" id="tab-quiz">
  <div id="quiz-setup">
    <div class="tri-toggle">
      <button class="tri-btn active" id="qb-h" onclick="setQType('h')">平假名<br>ひらがな</button>
      <button class="tri-btn" id="qb-k" onclick="setQType('k')">片假名<br>カタカナ</button>
      <button class="tri-btn" id="qb-m" onclick="setQType('m')">混合<br>ひ＋カ</button>
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:8px">選擇要測驗的行</div>
    <div id="q-hira-rows">
      <div class="section-label" id="q-hira-label">平假名</div>
      <div class="row-grid" id="q-hira-btns"></div>
    </div>
    <div id="q-kata-rows" style="display:none">
      <div class="section-label" id="q-kata-label">片假名</div>
      <div class="row-grid" id="q-kata-btns"></div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="qSelAll()">全選</button>
      <button class="ctrl-btn" onclick="qSelNone()">清除</button>
    </div>
    <div class="sel-summary">
      <span style="font-size:13px;color:#555">已選 <strong id="q-sel-count">0</strong> 個假名</span>
      <span style="font-size:12px;color:#aaa">至少需要 4 個</span>
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:8px">測驗模式</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
      <button class="mode-card active" id="qmode-read" onclick="setQMode('read')">
        <div class="mc-icon">👁️</div>
        <div class="mc-title">讀字測驗</div>
        <div class="mc-sub">看假名 → 選羅馬音</div>
      </button>
      <button class="mode-card" id="qmode-listen" onclick="setQMode('listen')">
        <div class="mc-icon">🔊</div>
        <div class="mc-title">聽音測驗</div>
        <div class="mc-sub">聽聲音 → 選日文假名</div>
      </button>
    </div>
    <button class="btn-main" onclick="startQuiz()">開始測驗</button>
  </div>
  <div id="quiz-game" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span style="font-size:12px;color:#aaa" id="q-mode-label"></span>
      <button onclick="endQuiz()" style="font-size:12px;color:#aaa;background:none;border:none;cursor:pointer;">結束</button>
    </div>
    <div class="quiz-scores">
      <div class="score-item"><div class="score-num" id="q-c">0</div><div class="score-lbl">答對</div></div>
      <div class="score-item"><div class="score-num" id="q-w">0</div><div class="score-lbl">答錯</div></div>
      <div class="score-item"><div class="score-num" id="q-r">0</div><div class="score-lbl">剩餘</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="q-prog"></div></div>
    <div class="quiz-box">
      <div id="q-read-area"><div class="quiz-ch" id="q-char">あ</div></div>
      <div id="q-listen-area" style="display:none;margin-bottom:16px;">
        <button onclick="speakQ()" style="width:80px;height:80px;border-radius:50%;border:none;background:#EEEDFE;cursor:pointer;font-size:32px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">🔊</button>
        <div style="font-size:11px;color:#aaa;margin-bottom:8px">點播放，選出正確的假名</div>
        <div id="q-reveal" style="font-size:13px;color:#888;min-height:20px;font-family:monospace;"></div>
      </div>
      <div class="quiz-opts" id="q-opts"></div>
      <div class="quiz-result" id="q-res"></div>
    </div>
  </div>
  <div id="quiz-end" style="display:none">
    <div class="end-box">
      <div class="end-emoji">🎌</div>
      <div class="end-title" id="qe-title"></div>
      <div class="end-sub" id="qe-sub"></div>
      <button class="btn-main" onclick="resetQuiz()">再來一次</button>
    </div>
  </div>
</div>

<!-- ══════════ 單字字卡 ══════════ -->
<div class="panel" id="tab-words">
  <div id="words-list">
    <div class="cat-scroll"><div class="cat-row" id="cat-row"></div></div>
    <div class="word-grid" id="word-grid"></div>
  </div>
  <div id="words-detail" style="display:none">
    <button class="back-btn" onclick="backToWords()">← 返回字卡</button>
    <div class="stroke-viewer">
      <div class="wdetail-jp" id="wd-jp">犬</div>
      <div class="wdetail-kana" id="wd-kana"></div>
      <div class="wdetail-tw" id="wd-tw"></div>
      <div class="wdetail-roma" id="wd-roma"></div>
      <button class="sound-btn" onclick="speakWD()">🔊 聽發音</button>
    </div>
    <div class="ex-box" id="wd-ex"></div>
    <div class="nav-row" style="margin-top:12px">
      <button class="nav-btn" onclick="prevWord()">← 上一個</button>
      <button class="nav-btn" onclick="nextWord()">下一個 →</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════
   五十音資料
═══════════════════════════════ */
// 格式: {h:平假名, k:片假名, r:羅馬音}  null=空格
const SEI_COLS=['あ段','い段','う段','え段','お段'];
const SEI=[
  {row:'あ行',cells:[{h:'あ',k:'ア',r:'a'},{h:'い',k:'イ',r:'i'},{h:'う',k:'ウ',r:'u'},{h:'え',k:'エ',r:'e'},{h:'お',k:'オ',r:'o'}]},
  {row:'か行',cells:[{h:'か',k:'カ',r:'ka'},{h:'き',k:'キ',r:'ki'},{h:'く',k:'ク',r:'ku'},{h:'け',k:'ケ',r:'ke'},{h:'こ',k:'コ',r:'ko'}]},
  {row:'さ行',cells:[{h:'さ',k:'サ',r:'sa'},{h:'し',k:'シ',r:'shi'},{h:'す',k:'ス',r:'su'},{h:'せ',k:'セ',r:'se'},{h:'そ',k:'ソ',r:'so'}]},
  {row:'た行',cells:[{h:'た',k:'タ',r:'ta'},{h:'ち',k:'チ',r:'chi'},{h:'つ',k:'ツ',r:'tsu'},{h:'て',k:'テ',r:'te'},{h:'と',k:'ト',r:'to'}]},
  {row:'な行',cells:[{h:'な',k:'ナ',r:'na'},{h:'に',k:'ニ',r:'ni'},{h:'ぬ',k:'ヌ',r:'nu'},{h:'ね',k:'ネ',r:'ne'},{h:'の',k:'ノ',r:'no'}]},
  {row:'は行',cells:[{h:'は',k:'ハ',r:'ha'},{h:'ひ',k:'ヒ',r:'hi'},{h:'ふ',k:'フ',r:'fu'},{h:'へ',k:'ヘ',r:'he'},{h:'ほ',k:'ホ',r:'ho'}]},
  {row:'ま行',cells:[{h:'ま',k:'マ',r:'ma'},{h:'み',k:'ミ',r:'mi'},{h:'む',k:'ム',r:'mu'},{h:'め',k:'メ',r:'me'},{h:'も',k:'モ',r:'mo'}]},
  {row:'や行',cells:[{h:'や',k:'ヤ',r:'ya'},null,{h:'ゆ',k:'ユ',r:'yu'},null,{h:'よ',k:'ヨ',r:'yo'}]},
  {row:'ら行',cells:[{h:'ら',k:'ラ',r:'ra'},{h:'り',k:'リ',r:'ri'},{h:'る',k:'ル',r:'ru'},{h:'れ',k:'レ',r:'re'},{h:'ろ',k:'ロ',r:'ro'}]},
  {row:'わ行',cells:[{h:'わ',k:'ワ',r:'wa'},null,null,null,{h:'を',k:'ヲ',r:'wo'}]},
  {row:'ん',cells:[{h:'ん',k:'ン',r:'n'},null,null,null,null]},
];
const DAKU_COLS=['あ段','い段','う段','え段','お段'];
const DAKU=[

let showH=true, showK=true;
function speak(txt){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='ja-JP';u.rate=0.85;speechSynthesis.speak(u);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function showTab(name){
  ['select','stroke','quiz','words'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.getElementById('tab-'+n).classList.toggle('active',n===name);
  });
}

// 選取狀態：key = "sec:rowIdx:colIdx"
const selected = new Set();

function toggleFilter(type){
  if(type==='h') showH=!showH;
  else showK=!showK;
  // 至少保留一種
  if(!showH&&!showK){ if(type==='h')showH=true; else showK=true; }
  document.getElementById('fp-h').className='fpill'+(showH?' on-h':'');
  document.getElementById('fp-k').className='fpill'+(showK?' on-k':'');
  renderAllTables();
}

function cellKey(sec,ri,ci){return `${sec}:${ri}:${ci}`;}

function toggleCell(sec,ri,ci,char){
  const k=cellKey(sec,ri,ci);
  if(selected.has(k)) selected.delete(k); else selected.add(k);
  renderAllTables();
  speak(char);
}

function toggleRow(sec,data,ri){
  // check if all cells in row are selected
  const row=data[ri];
  const keys=row.cells.map((c,ci)=>c?cellKey(sec,ri,ci):null).filter(Boolean);
  const allSel=keys.every(k=>selected.has(k));
  keys.forEach(k=>allSel?selected.delete(k):selected.add(k));
  renderAllTables();
}

function buildTable(tableId, data, cols, sec){
  const tbl=document.getElementById(tableId);
  let html='<tr><th style="width:44px;padding:0"></th>';
  cols.forEach(c=>html+=`<th class="col-hd" style="width:60px">${c}</th>`);
  html+='</tr>';
  data.forEach((row,ri)=>{
    const rowKeys=row.cells.map((c,ci)=>c?cellKey(sec,ri,ci):null).filter(Boolean);
    const allSel=rowKeys.length>0&&rowKeys.every(k=>selected.has(k));
    html+=`<tr>`;
    html+=`<td><div class="row-hd ${allSel?'':'opacity-70'}" onclick="toggleRow('${sec}',${sec==='sei'?'SEI':sec==='daku'?'DAKU':sec==='han'?'HAN':'YOU'},${ri})"
      style="${allSel?'outline:2px solid #1a1a1a;outline-offset:1px;':''}">${row.row}</div></td>`;
    row.cells.forEach((c,ci)=>{
      if(!c){html+=`<td style="width:60px"><div class="kc-empty"></div></td>`;return;}
      const k=cellKey(sec,ri,ci);
      const isSel=selected.has(k);
      html+=`<td style="width:60px"><div class="kc ${isSel?'selected':''}" onclick="toggleCell('${sec}',${ri},${ci},'${c.h}')"><div class="dual">${showH?`<span class="h">${c.h}</span>`:''} ${showK?`<span class="k">${c.k}</span>`:''}<span class="r">${c.r}</span></div></div></td>`;
    });
    html+='</tr>';
  });
  tbl.innerHTML=html;
}

function renderAllTables(){
  buildTable('tbl-sei',SEI,SEI_COLS,'sei');
  buildTable('tbl-daku',DAKU,DAKU_COLS,'daku');
  buildTable('tbl-han',HAN,['あ段','い段','う段','え段','お段'],'han');
  buildTable('tbl-you',YOU,YOU_COLS,'you');
}

// 預設全選清音
function initSelect(){
  SEI.forEach((row,ri)=>row.cells.forEach((c,ci)=>{if(c)selected.add(cellKey('sei',ri,ci));}));
  renderAllTables();
}

  const list=getQKana();
  if(list.length<4){alert('請至少選擇 4 個假名！');return;}
  qQueue=shuffle([...list]);qPos=0;qC=0;qW=0;qAns=false;
  document.getElementById('quiz-setup').style.display='none';
  document.getElementById('quiz-end').style.display='none';
  document.getElementById('quiz-game').style.display='block';
  document.getElementById('q-mode-label').textContent=qMode==='read'?'👁️ 讀字測驗':'🔊 聽音測驗';
  document.getElementById('q-read-area').style.display=qMode==='listen'?'none':'block';
  document.getElementById('q-listen-area').style.display=qMode==='listen'?'block':'none';
  showQ();
}
function showQ(){
  if(qPos>=qQueue.length){showEnd();return;}
  qAns=false;
  const q=qQueue[qPos],total=qQueue.length;
  curQChar=q.c;
  document.getElementById('q-char').textContent=q.c;
  document.getElementById('q-r').textContent=total-qPos;
  document.getElementById('q-c').textContent=qC;
  document.getElementById('q-w').textContent=qW;
  document.getElementById('q-prog').style.width=(qPos/total*100)+'%';
  document.getElementById('q-res').textContent='';
  if(qMode==='listen') document.getElementById('q-reveal').textContent='';
  const all=getAllQKana();
  let opts=[q];
  if(qMode==='read'){
    const pool=shuffle(all.filter(c=>c.r!==q.r));
    while(opts.length<Math.min(4,pool.length+1)) opts.push(pool[opts.length-1]);
    shuffle(opts);
    document.getElementById('q-opts').innerHTML=opts.map(o=>
      `<button class="quiz-opt" style="font-family:monospace" onclick="answerRead('${o.r}','${q.r}')">${o.r}</button>`).join('');
  } else {
    const pool=shuffle(all.filter(c=>c.c!==q.c));
    while(opts.length<Math.min(4,pool.length+1)) opts.push(pool[opts.length-1]);
    shuffle(opts);
    document.getElementById('q-opts').innerHTML=opts.map(o=>
      `<button class="quiz-opt" style="font-size:24px" onclick="answerListen('${o.c}','${q.c}','${q.r}')">${o.c}</button>`).join('');
    setTimeout(()=>speak(q.c),250);
  }
}
function answerRead(chosen,correct){
  if(qAns)return; qAns=true;
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b.textContent===chosen&&chosen!==correct)b.classList.add('wrong');
  });
  const ok=chosen===correct;
  if(ok){qC++;document.getElementById('q-res').textContent='✓ 答對了！';document.getElementById('q-res').style.color='#3B6D11';}
  else{qW++;document.getElementById('q-res').textContent='✗ 正確答案是 '+correct;document.getElementById('q-res').style.color='#A32D2D';}
  document.getElementById('q-c').textContent=qC;document.getElementById('q-w').textContent=qW;
  setTimeout(()=>{qPos++;showQ();},1500);
}
function answerListen(chosen,correct,romaOfCorrect){
  if(qAns)return; qAns=true;
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b.textContent===chosen&&chosen!==correct)b.classList.add('wrong');
  });
  document.getElementById('q-reveal').textContent=correct+' = '+romaOfCorrect;
  setTimeout(()=>speak(correct),150);
  const ok=chosen===correct;
  if(ok){qC++;document.getElementById('q-res').textContent='✓ 答對了！';document.getElementById('q-res').style.color='#3B6D11';}
  else{qW++;document.getElementById('q-res').textContent='✗ 正確是 '+correct+' ('+romaOfCorrect+')';document.getElementById('q-res').style.color='#A32D2D';}
  document.getElementById('q-c').textContent=qC;document.getElementById('q-w').textContent=qW;
  setTimeout(()=>{qPos++;showQ();},1800);
}
function showEnd(){
  document.getElementById('quiz-game').style.display='none';
  document.getElementById('quiz-end').style.display='block';
  const total=qQueue.length,pct=Math.round(qC/total*100);
  document.getElementById('qe-title').textContent=pct>=80?'太棒了！🌸':pct>=50?'繼續加油！':'多練習就會進步！';
  document.getElementById('qe-sub').textContent=`答對 ${qC} / ${total} 題・正確率 ${pct}%`;
}
function endQuiz(){showEnd();}
function resetQuiz(){document.getElementById('quiz-end').style.display='none';document.getElementById('quiz-setup').style.display='block';}

/* ═══════════════════════════════
   單字字卡
═══════════════════════════════ */
let wCat='全部',wIdx=0,wFiltered=[];
function speakWD(){speak(document.getElementById('wd-jp').textContent+'、'+document.getElementById('wd-kana').textContent);}
function renderCats(){
  document.getElementById('cat-row').innerHTML=CATS.map(c=>
    `<button class="cat-btn ${wCat===c?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}
function setCat(c){wCat=c;renderCats();renderWords();}
function renderWords(){
  wFiltered=wCat==='全部'?WORDS:WORDS.filter(w=>w.cat===wCat);
  document.getElementById('word-grid').innerHTML=wFiltered.map((w,i)=>
    `<div class="word-card" onclick="openWord(${i})">
      <div class="w-icon">🔊</div>
      <div class="w-jp">${w.jp}</div>
      <div class="w-kana">${w.kana}</div>
      <div class="w-tw">${w.tw}</div>
      <div class="w-roma">${w.roma}</div>
    </div>`).join('');
}
function openWord(i){wIdx=i;document.getElementById('words-list').style.display='none';document.getElementById('words-detail').style.display='block';showWD();}
function backToWords(){document.getElementById('words-list').style.display='block';document.getElementById('words-detail').style.display='none';}
function showWD(){
  const w=wFiltered[wIdx];
  document.getElementById('wd-jp').textContent=w.jp;
  document.getElementById('wd-kana').textContent=w.kana;
  document.getElementById('wd-tw').textContent=w.tw;
  document.getElementById('wd-roma').textContent=w.roma;
  document.getElementById('wd-ex').innerHTML=`<div class="ex-jp">${w.ex.jp}</div><div class="ex-tw">${w.ex.tw}</div>`;
  speak(w.jp+'、'+w.kana);
}
function prevWord(){wIdx=(wIdx-1+wFiltered.length)%wFiltered.length;showWD();}
function nextWord(){wIdx=(wIdx+1)%wFiltered.length;showWD();}

/* ── Init ── */
initSelect();
setStrokeType('h');
setQType('h');
renderCats();
renderWords();
</script>
